on: [workflow_dispatch,push]
name: CI Workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
    unit-test:
        strategy:
            matrix:
                nodejs-version: [18, 20]
                os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        services:
            mongo-db:
                image: siddharth67/mongo-db:non-prod
                ports:
                    - 27017:27017
        env:
            MONGO_URI: mongodb://localhost:27017/superData
            MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
            MONGO_PASSWORD: ${{ secrets.MONGO_PASS }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name : setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.nodejs-version }}

            - name: cache node dependencies
              uses: actions/cache@v3
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Run Unit Tests
              id: unit_test
              run: npm test

            - name: Archive test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: test-results
                  path: test-results.xml
    
    code-coverage:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name : setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: '18'

            - name: cache node dependencies
              uses: actions/cache@v3
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Run Code Coverage
              run: npm run coverage
              continue-on-error: true

            - name: Upload Code Coverage-Report
              uses: actions/upload-artifact@v5
              if: always()
              with:
                  name: code-coverage-report
                  path: coverage
                  retention-days: 5
    
    docker:
        name: containerizaton
        runs-on: ubuntu-latest
        needs: [unit-test, code-coverage]
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                  username: ${{ vars.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
              
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push to cotainer registry
              uses: docker/build-push-action@v4
              with:
                  context: .   #going to search for Dockerfile in the root directory
                  push: true
                  tags: |
                     ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
                     ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}
            



            
              


